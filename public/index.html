<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <scr
</head>
<body>

  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <div class="">

    <header class="site-header">
      <div class="header-badge">ANNA UNIVERSITY · NOV/DEC 2025</div>
      <h1 class="site-title">GIET Result Portal</h1>
      <p class="site-sub">Global Institute of Engineering and Technology</p>
    </header>

    <main class="main-content">
      <section class="search-card" id="search-section">
        <div class="search-row">
          <input
            id="regInput"
            type="text"
            class="search-input"
            placeholder="e.g. 510924104068"
            maxlength="12"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="searchBtn" class="search-btn" onclick="searchResult()">
            <span class="btn-icon">→</span>
          </button>
        </div>
        <p class="search-hint">B.E. CSE · B.Tech IT · B.E. AIML · B.Tech AIDS · M.E. CSE · All Semesters</p>
      </section>

      <div id="errorBox" class="error-box hidden">
        <span class="error-icon">⚠</span>
        <span id="errorMsg">Register number not found.</span>
      </div>

      <div id="loadingBox" class="loading-box hidden">
        <div class="spinner"></div>
        <span>Fetching results…</span>
      </div>

      <section id="resultCard" class="result-card hidden">

          <div class="meta-block">
            <span class="meta-label">Department</span>
            <span class="meta-value" id="rDept">—</span>
          </div>
        </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
